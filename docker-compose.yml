services:
  postgres:
    image: postgres:16-alpine
    container_name: pixl-sales-brain-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pixl
      POSTGRES_PASSWORD: pixl_secret_2026
      POSTGRES_DB: pixl_sales_brain
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
